name: Warmup Draft Generator

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Warm-up start date in Japan time, for example 2026-05-24"
        required: false
        type: string
  schedule:
    - cron: "10 23 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      WARMUP_DAYS: "7"
      WARMUP_POSTS_PER_DAY: "3"
      WARMUP_PLATFORMS: x,pinterest,instagram,threads
      WARMUP_START_DATE: ${{ inputs.start_date }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Generate warm-up drafts
        run: npm run warmup
      - name: Upload manual posting bundle
        uses: actions/upload-artifact@v4
        with:
          name: warmup-manual-posts
          path: generated/manual-posts.md
          if-no-files-found: error
